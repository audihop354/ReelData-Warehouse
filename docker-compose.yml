services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./configs/init-db.sql:/docker-entrypoint-initdb.d/init-metabase.sql
  dagster-webserver:
    build:
      context: .
    command: dagster-webserver -h 0.0.0.0 -p 3000 -m movie_pipeline.definitions
    env_file:
      - .env
    environment:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    ports:
      - "3000:3000"
      - "4040:4040"  
    volumes:
      - ./:/opt/dagster/app
      - ./configs:/opt/dagster/dagster_home
    depends_on:
      - postgres
  dagster-daemon:
    build:
      context: .
    command: dagster-daemon run -m movie_pipeline.definitions
    env_file:
      - .env
    environment:
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    volumes:
      - ./:/opt/dagster/app
      - ./configs:/opt/dagster/dagster_home
    depends_on:
      - postgres
  metabase:
    image: metabase/metabase:latest
    ports:
      - "3001:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    depends_on:
      - postgres
    volumes:
      - metabase-data:/metabase-data
volumes:
  postgres-data:
  metabase-data:
